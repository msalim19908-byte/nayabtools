<!DOCTYPE html>
<html>
<head>
<title>Background Remover - NayabTools</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  text-align:center;
  margin:0;
}

.nav{
  background:#1e293b;
  padding:12px;
}

.nav a{
  color:white;
  margin:10px;
  text-decoration:none;
}

.container{
  background:white;
  width:90%;
  max-width:500px;
  margin:30px auto;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px #ccc;
}

button{
  padding:10px 20px;
  background:#38bdf8;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

img{
  max-width:100%;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">🏠 Home</a>
  <a href="compressor.html">🖼 Image</a>
  <a href="converter.html">💱 Currency</a>
  <a href="cv.html">📄 CV</a>
  <a href="pdf.html">📁 PDF</a>
</div>

<div style="padding:20px;background:#0f172a;color:white;">
  <div style="font-size:40px;">✨</div>
  <h1>NayabTools</h1>
  <p>Background Remover Tool</p>
</div>

<div class="container">

<h2>Upload Image</h2>

<input type="file" id="imageInput" accept="image/*"><br><br>

<button onclick="showImage()">Preview Image</button>

<div id="output"></div>

</div>

<script>
function showImage(){
  let file = document.getElementById("imageInput").files[0];

  if(!file){
    alert("Please select image");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){
    document.getElementById("output").innerHTML =
      "<h3>Preview</h3><img src='"+e.target.result+"'>";
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
